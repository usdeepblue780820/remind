<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提醒事項小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .form-card { 
            background: white; 
            border-radius: 1.25rem; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
        }
        input[type="datetime-local"] {
            appearance: none;
            -webkit-appearance: none;
            min-height: 3rem;
        }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">

    <div class="form-card w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">提醒事項小幫手</h1>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">提醒事項</label>
                <input type="text" id="task" placeholder="例如：與xxx吃飯、看醫生" 
                    class="block w-full border border-gray-300 rounded-xl shadow-sm p-3 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">選擇日期與時間</label>
                <input type="datetime-local" id="datetime" 
                    class="block w-full border border-gray-300 rounded-xl shadow-sm p-3 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all text-gray-700">
                <p class="text-xs text-gray-400 mt-2">點擊上方框欄開啟月曆</p>
            </div>

            <button onclick="submitForm()" id="submitBtn"
                class="w-full bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700 active:scale-95 transition-all shadow-lg shadow-green-200">
                儲存提醒
            </button>
        </div>

        <div id="statusMsg" class="mt-6 text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        const MY_LIFF_ID = '2009768155-juHmylqj';   // 你的真實 LIFF ID

        async function initLiff() {
            const status = document.getElementById('statusMsg');
            
            try {
                showStatus('🔄 LIFF 初始化中...', 'text-gray-500');
                
                await liff.init({ liffId: MY_LIFF_ID });
                console.log('✅ LIFF 初始化成功');

                if (!liff.isLoggedIn()) {
                    showStatus('🔑 跳轉 LINE 登入中...', 'text-blue-500');
                    liff.login();
                    return;
                }

                // 已登入，取得用戶資料
                const profile = await liff.getProfile();
                showStatus(`✅ 已登入！<br>歡迎 ${profile.displayName}`, 'text-green-600');
                console.log('用戶 ID:', profile.userId);

            } catch (err) {
                console.error('LIFF 初始化錯誤:', err);
                let msg = '初始化失敗：' + (err.message || err);
                if (err.message && err.message.includes('channel')) {
                    msg = 'LIFF ID 或 Endpoint URL 設定有誤，請確認 LINE Developers';
                }
                showStatus(msg, 'text-red-500');
            }
        }

        async function submitForm() {
            const task = document.getElementById('task').value.trim();
            const datetime = document.getElementById('datetime').value;
            const btn = document.getElementById('submitBtn');

            if (!task || !datetime) {
                showStatus('請填寫提醒事項和時間', 'text-red-500');
                return;
            }

            btn.disabled = true;
            btn.innerText = '儲存中...';

            const formattedDate = datetime.replace('T', ' ');

            try {
                await liff.sendMessages([{
                    type: 'text',
                    text: `[紀錄] ${task} ${formattedDate}`
                }]);

                showStatus('✅ 提醒已成功設定！<br>已傳送到聊天室', 'text-green-600');
                
                setTimeout(() => {
                    liff.closeWindow();
                }, 1800);

            } catch (err) {
                console.error('傳送錯誤:', err);
                showStatus('傳送失敗：' + (err.message || '請稍後再試'), 'text-red-500');
                btn.disabled = false;
                btn.innerText = '儲存提醒';
            }
        }

        function showStatus(msg, colorClass) {
            const status = document.getElementById('statusMsg');
            status.innerHTML = msg;
            status.className = `mt-6 text-center text-sm font-medium ${colorClass}`;
            status.classList.remove('hidden');
        }

        // 頁面載入後執行
        window.onload = initLiff;
    </script>
</body>
</html>
