<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提醒事項小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .form-card { background: white; border-radius: 1.25rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        input[type="datetime-local"] { min-height: 3rem; }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">

    <div class="form-card w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">提醒事項小幫手</h1>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">提醒事項</label>
                <input type="text" id="task" placeholder="例如：與xxx吃飯、看醫生" 
                    class="block w-full border border-gray-300 rounded-xl shadow-sm p-3 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">選擇日期與時間</label>
                <input type="datetime-local" id="datetime" 
                    class="block w-full border border-gray-300 rounded-xl shadow-sm p-3 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all text-gray-700">
                <p class="text-xs text-gray-400 mt-2">點擊上方框欄開啟月曆</p>
            </div>

            <button onclick="submitForm()" id="submitBtn"
                class="w-full bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700 active:scale-95 transition-all shadow-lg shadow-green-200">
                儲存提醒
            </button>
        </div>

        <div id="statusMsg" class="mt-6 text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        const MY_LIFF_ID = '2009768155-juHmylqj';
        // ←←← 重要：請改成你 Google Apps Script 部署後的 Web App URL（結尾必須是 /exec）
        const WEB_APP_URL = 'https://script.google.com/macros/s/你的WebAppID/exec';  

        async function initLiff() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
            } catch (err) {
                console.error('LIFF 初始化失敗', err);
            }
        }

        async function submitForm() {
            const task = document.getElementById('task').value.trim();
            const datetime = document.getElementById('datetime').value;
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusMsg');

            if (!task || !datetime) {
                status.innerHTML = '請填寫提醒事項和時間';
                status.className = 'mt-6 text-center text-sm font-medium text-red-500';
                status.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerText = '儲存中...';
            status.classList.add('hidden');

            const formattedDate = datetime.replace('T', ' ');

            try {
                // 直接呼叫後端寫入試算表
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'addReminder',
                        task: task,
                        datetime: formattedDate
                    })
                });

                if (response.ok) {
                    status.innerHTML = '✅ 提醒已成功儲存！<br>將在 1 天前與 1 小時前提醒您';
                    status.className = 'mt-6 text-center text-sm font-medium text-green-600';
                    status.classList.remove('hidden');

                    // 可選：同時在聊天室顯示確認
                    await liff.sendMessages([{
                        type: 'text',
                        text: `✅ 已設定提醒\n事項：${task}\n時間：${formattedDate}`
                    }]);

                    // 清空表單
                    document.getElementById('task').value = '';
                    document.getElementById('datetime').value = '';
                } else {
                    throw new Error('後端儲存失敗');
                }
            } catch (err) {
                console.error(err);
                status.innerHTML = '儲存失敗，請稍後再試';
                status.className = 'mt-6 text-center text-sm font-medium text-red-500';
                status.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = '儲存提醒';
            }
        }

        window.onload = initLiff;
    </script>
</body>
</html>
