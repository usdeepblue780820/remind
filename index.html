<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提醒事項小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .form-card { background: white; border-radius: 1.5rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">

    <div class="form-card w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">提醒事項小幫手</h1>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-2">提醒事項</label>
                <input type="text" id="task" placeholder="輸入要提醒的事項..." 
                    class="block w-full border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-green-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-600 mb-2">日期與時間</label>
                <input type="datetime-local" id="datetime" 
                    class="block w-full border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-green-500 outline-none text-slate-700">
            </div>

            <button onclick="submitForm()" id="submitBtn"
                class="w-full bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700 active:scale-95 transition-all shadow-lg shadow-green-200">
                儲存提醒
            </button>
        </div>

        <div id="statusMsg" class="mt-6 text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        // 請確保這是您在 LINE Developer 看到的正確 LIFF ID
        const LIFF_ID = '2009768155-juHmylqj'; 

        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                }
            } catch (err) {
                console.error('LIFF 初始化失敗', err);
            }
        }

        async function submitForm() {
            const task = document.getElementById('task').value.trim();
            const datetime = document.getElementById('datetime').value;
            const btn = document.getElementById('submitBtn');

            if (!task || !datetime) {
                alert('請完整填寫事項內容與時間');
                return;
            }

            btn.disabled = true;
            btn.innerText = '處理中...';

            try {
                if (!liff.isInClient()) {
                    throw new Error('請從 LINE 聊天視窗內開啟小幫手');
                }

                // 格式化日期：將 T 換成空格
                const formattedDate = datetime.replace('T', ' ');

                // 直接發送訊息到聊天室
                await liff.sendMessages([{
                    type: 'text',
                    text: `[紀錄] ${task} ${formattedDate}`
                }]);

                showStatus('✅ 儲存成功！視窗即將關閉', 'text-green-600');
                
                // 成功後延遲關閉視窗
                setTimeout(() => {
                    liff.closeWindow();
                }, 1200);

            } catch (err) {
                alert('儲存失敗：' + err.message);
                btn.disabled = false;
                btn.innerText = '儲存提醒';
            }
        }

        function showStatus(msg, colorClass) {
            const status = document.getElementById('statusMsg');
            status.innerHTML = msg;
            status.className = `mt-6 text-center text-sm font-medium ${colorClass}`;
            status.classList.remove('hidden');
        }

        window.onload = initLiff;
    </script>
</body>
</html>
