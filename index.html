<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提醒事項小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .form-card { 
            background: white; 
            border-radius: 1.25rem; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
        }
        input[type="datetime-local"] {
            min-height: 3rem;
        }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">

    <div class="form-card w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">提醒事項小幫手</h1>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">提醒事項</label>
                <input type="text" id="task" placeholder="例如：與xxx吃飯、看醫生" 
                    class="block w-full border border-gray-300 rounded-xl shadow-sm p-3 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">選擇日期與時間</label>
                <input type="datetime-local" id="datetime" 
                    class="block w-full border border-gray-300 rounded-xl shadow-sm p-3 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all text-gray-700">
                <p class="text-xs text-gray-400 mt-2">點擊上方框欄開啟月曆</p>
            </div>

            <button onclick="submitForm()" id="submitBtn"
                class="w-full bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700 active:scale-95 transition-all shadow-lg shadow-green-200">
                儲存提醒
            </button>
        </div>

        <div id="statusMsg" class="mt-6 text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        const MY_LIFF_ID = '2009768155-juHmylqj';
        
        // ←←←【重要】請把下面這行改成你實際部署的 Web App URL（結尾必須是 /exec）
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzm8yPJm05NM9HCXrwr-c9kp1fA_-OQcoGQSA58HJxMABuxqvp_T1B01gCiIrUe88pw/exec';

        async function initLiff() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
            } catch (err) {
                console.error('LIFF 初始化失敗', err);
                showStatus('LIFF 初始化失敗，請重新整理頁面', 'text-red-500');
            }
        }

        async function submitForm() {
            const task = document.getElementById('task').value.trim();
            const datetime = document.getElementById('datetime').value;
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusMsg');

            if (!task || !datetime) {
                showStatus('請填寫提醒事項和時間', 'text-red-500');
                return;
            }

            btn.disabled = true;
            btn.innerText = '儲存中...';
            status.classList.add('hidden');

            const formattedDate = datetime.replace('T', ' ');

            try {
                // 呼叫後端（使用 text/plain 避開 CORS 問題）
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'text/plain' 
                    },
                    body: JSON.stringify({
                        action: 'addReminder',
                        task: task,
                        datetime: formattedDate
                    })
                });

                if (response.ok) {
                    showStatus('✅ 提醒已成功儲存！<br>將在 1 天前與 1 小時前自動提醒您', 'text-green-600');

                    // 同時在聊天室顯示確認訊息
                    await liff.sendMessages([{
                        type: 'text',
                        text: `✅ 已設定提醒\n事項：${task}\n時間：${formattedDate}`
                    }]);

                    // 清空表單
                    document.getElementById('task').value = '';
                    document.getElementById('datetime').value = '';
                } else {
                    throw new Error('後端儲存失敗');
                }
            } catch (err) {
                console.error('儲存錯誤:', err);
                showStatus('儲存失敗，請檢查網路或 Web App URL 是否正確', 'text-red-500');
            } finally {
                btn.disabled = false;
                btn.innerText = '儲存提醒';
            }
        }

        function showStatus(msg, colorClass) {
            const status = document.getElementById('statusMsg');
            status.innerHTML = msg;
            status.className = `mt-6 text-center text-sm font-medium ${colorClass}`;
            status.classList.remove('hidden');
        }

        // 頁面載入時執行 LIFF 初始化
        window.onload = initLiff;
    </script>
</body>
</html>
