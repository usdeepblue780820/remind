<script>
    const MY_LIFF_ID = '2009768155-juHmylqj';   // ← 你的真實 LIFF ID

    async function initLiff() {
        const status = document.getElementById('statusMsg');
        
        if (MY_LIFF_ID === 'YOUR_LIFF_ID_HERE') {
            showStatus('錯誤：請設定正確的 LIFF ID', 'text-red-500');
            return;
        }

        try {
            showStatus('🔄 LIFF 初始化中...', 'text-gray-500');
            
            await liff.init({ liffId: MY_LIFF_ID });
            console.log('✅ LIFF 初始化成功');

            if (!liff.isLoggedIn()) {
                showStatus('🔑 跳轉 LINE 登入...', 'text-blue-500');
                liff.login();
                return;
            }

            // 已登入，顯示歡迎訊息
            const profile = await liff.getProfile();
            showStatus(`✅ 已登入！<br>歡迎 ${profile.displayName}`, 'text-green-600');
            console.log('用戶 ID:', profile.userId);

        } catch (err) {
            console.error('LIFF 初始化錯誤:', err);
            let msg = '初始化失敗：' + (err.message || err);
            if (err.message.includes('channel') || err.message.includes('not found')) {
                msg = 'LIFF ID 或 Endpoint URL 設定錯誤，請到 LINE Developers 確認';
            }
            showStatus(msg, 'text-red-500');
        }
    }

    async function submitForm() {
        const task = document.getElementById('task').value.trim();
        const datetime = document.getElementById('datetime').value;
        const btn = document.getElementById('submitBtn');

        if (!task || !datetime) {
            showStatus('請填寫提醒事項和時間', 'text-red-500');
            return;
        }

        btn.disabled = true;
        btn.innerText = '儲存中...';

        const formattedDate = datetime.replace('T', ' ');

        try {
            // 安全檢查：確認 sendMessages 是否可用
            if (!liff.isLoggedIn()) {
                showStatus('請先登入 LINE', 'text-red-500');
                return;
            }

            await liff.sendMessages([{
                type: 'text',
                text: `[紀錄] ${task} ${formattedDate}`
            }]);

            showStatus('✅ 提醒已成功設定！\n已傳送至聊天室', 'text-green-600');
            
            // 1.5 秒後自動關閉 LIFF 視窗
            setTimeout(() => {
                liff.closeWindow();
            }, 1500);

        } catch (err) {
            console.error('傳送錯誤:', err);
            showStatus('傳送失敗：' + (err.message || '請稍後再試'), 'text-red-500');
            
            // 恢復按鈕
            btn.disabled = false;
            btn.innerText = '儲存提醒';
        }
    }

    function showStatus(msg, colorClass) {
        const status = document.getElementById('statusMsg');
        status.innerHTML = msg;                    // 改用 innerHTML 支援換行
        status.className = `mt-6 text-center text-sm font-medium ${colorClass}`;
        status.classList.remove('hidden');
    }

    // 頁面載入後執行初始化
    window.onload = initLiff;
</script>
